version: '3.8'

services:
  app:
    # Imagen base para Node.js (la misma que usa el devcontainer)
    image: mcr.microsoft.com/devcontainers/javascript-node:20

    # Monta el código fuente en el contenedor
    volumes:
      - ..:/workspaces/test-containers-demo:cached
      - /var/run/docker.sock:/var/run/docker.sock

    # Directorio de trabajo
    working_dir: /workspaces/test-containers-demo

    # Mantiene el contenedor en ejecución
    command: sleep infinity

    # Expone el puerto de la aplicación
    ports:
      - "3000:3000"

    # Variables de entorno
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres

    # Dependencias
    depends_on:
      postgres:
        condition: service_healthy

    # Configuración de usuario y privilegios
    user: node
    privileged: true

    # Red
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine

    # Variables de entorno para PostgreSQL
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

    # Expone el puerto de la base de datos
    ports:
      - "5432:5432"

    # Volumen para persistir datos
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s

    # Red
    networks:
      - dev-network

# Definición de volúmenes
volumes:
  postgres_data:

# Definición de redes
networks:
  dev-network:
    driver: bridge