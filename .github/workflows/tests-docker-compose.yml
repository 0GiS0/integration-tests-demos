name: "🐳🐳 Tests con Docker Compose"

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install deps
        run: npm ci

      - name: ⏰ Start timer
        run: echo "TEST_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🐳 Run tests (legacy docker-compose)
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run test:legacy:docker-compose

      - name: ⏱️ Calculate test duration
        if: always()
        run: |
          TEST_END_TIME=$(date +%s)
          TEST_DURATION=$((TEST_END_TIME - TEST_START_TIME))
          echo "TEST_DURATION_SECONDS=$TEST_DURATION" >> $GITHUB_ENV
          echo "TEST_DURATION_FORMATTED=$(printf '%02d:%02d' $((TEST_DURATION/60)) $((TEST_DURATION%60)))" >> $GITHUB_ENV

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: '🐳 Docker Compose Tests Results'
          path: 'test-results/junit.xml'
          reporter: jest-junit
          fail-on-error: 'false'

      - name: 📝 Add Test Summary to PR
        if: always()
        run: |
          echo "## 🐳 Docker Compose Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Tiempo de ejecución:** $TEST_DURATION_FORMATTED (${TEST_DURATION_SECONDS}s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/junit.xml" ]; then
            echo "✅ Tests ejecutados correctamente" >> $GITHUB_STEP_SUMMARY
            echo "📁 Archivo de resultados: \`test-results/junit.xml\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No se pudo generar el archivo de resultados" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
