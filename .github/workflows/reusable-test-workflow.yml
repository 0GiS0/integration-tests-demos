name: "🔄 Reusable Test Workflow"

on:
  workflow_call:
    inputs:
      test-command:
        description: "El comando npm para ejecutar los tests"
        required: true
        type: string
      test-name:
        description: "Nombre descriptivo para los tests (ej: Mock Tests)"
        required: true
        type: string
      test-emoji:
        description: "Emoji para identificar el tipo de test"
        required: true
        type: string
      runner-emoji:
        description: "Emoji para el step de ejecución"
        required: true
        type: string
      node-version:
        description: "Versión de Node.js a usar"
        required: false
        type: string
        default: "20"
      database-url:
        description: "URL de la base de datos si se necesita"
        required: false
        type: string
        default: ""

jobs:
  reusable-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: ${{ inputs.runner-emoji }} Run tests (${{ inputs.test-name }})
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: ${{ inputs.database-url }}
        run: ${{ inputs.test-command }}

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "${{ inputs.test-emoji }} ${{ inputs.test-name }} Results"
          path: "test-results/junit.xml"
          reporter: jest-junit
          fail-on-error: "false"

      - name: 📝 Add Test Summary to PR
        if: always()
        run: |
          echo "## ${{ inputs.test-emoji }} ${{ inputs.test-name }} Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/junit.xml" ]; then
            echo "✅ Tests ejecutados" >> $GITHUB_STEP_SUMMARY
            echo "📁 Archivo de resultados: \`test-results/junit.xml\`" >> $GITHUB_STEP_SUMMARY
            node scripts/generate-test-summary.mjs >> $GITHUB_STEP_SUMMARY || echo "⚠️ No se pudo generar la tabla" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No se pudo generar el archivo de resultados" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
