name: "🖥️ Tests con GitHub Actions Services"

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install deps
        run: npm ci

      - name: ⏰ Start timer
        run: echo "TEST_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🖥️ Run tests (legacy no containers)
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          # apuntar a service de GH Actions (localhost:5432)
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run test:legacy:no-containers

      - name: ⏱️ Calculate test duration
        if: always()
        run: |
          TEST_END_TIME=$(date +%s)
          TEST_DURATION=$((TEST_END_TIME - TEST_START_TIME))
          echo "TEST_DURATION_SECONDS=$TEST_DURATION" >> $GITHUB_ENV
          echo "TEST_DURATION_FORMATTED=$(printf '%02d:%02d' $((TEST_DURATION/60)) $((TEST_DURATION%60)))" >> $GITHUB_ENV

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "🖥️ No Containers Tests Results"
          path: "test-results/junit.xml"
          reporter: jest-junit
          fail-on-error: "false"

      - name: 📝 Add Test Summary to PR
        if: always()
        run: |
          echo "## 🖥️ No Containers Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Tiempo de ejecución:** $TEST_DURATION_FORMATTED (${TEST_DURATION_SECONDS}s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/junit.xml" ]; then
            echo "✅ Tests ejecutados correctamente" >> $GITHUB_STEP_SUMMARY
            echo "📁 Archivo de resultados: \`test-results/junit.xml\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No se pudo generar el archivo de resultados" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
