name: "🧪🚀 Tests con GitHub Actions Services"

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install deps
        run: npm ci

      - name: 🖥️ Run tests (legacy no containers)
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          # apuntar a service de GH Actions (localhost:5432)
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run test:no-containers

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "🖥️ No Containers Tests Results"
          path: "test-results/junit.xml"
          reporter: jest-junit
          fail-on-error: "false"
      - name: 🧾 Generate Markdown Test Summary
        if: always()
        run: |
          echo "## 🖥️ No Containers Tests Results" >> $GITHUB_STEP_SUMMARY
          node scripts/generate-test-summary.mjs >> $GITHUB_STEP_SUMMARY
