name: "🖥️ Tests - no containers (legacy)"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests (legacy no containers)
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          # apuntar a service de GH Actions (localhost:5432)
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run test:legacy:no-containers
