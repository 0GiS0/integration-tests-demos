name: "🖥️ Tests con GitHub Actions Services"

on:
  push:
  pull_request:

jobs:
  test:
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: '--health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5'

    uses: ./.github/workflows/reusable-test-workflow.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      test-command: "npm run test:legacy:no-containers"
      test-name: "GitHub Actions Services Tests"
      test-emoji: "🖥️"
      runner-emoji: "🖥️"
      node-version: "20"
      needs-postgres: true
      database-url: "postgres://postgres:postgres@127.0.0.1:5432/postgres"
